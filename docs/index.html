<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>民法刷题</title>
<style>
:root {
  --bg: #f0f2f5;
  --card-bg: #fff;
  --text: #1a1a2e;
  --muted: #8892b0;
  --single: #4f6ef7;
  --multi: #f59e0b;
  --judge: #10b981;
  --radius: 16px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  min-height: 100vh;
}
.container { max-width: 720px; margin: 0 auto; padding: 40px 16px; }
.card {
  background: var(--card-bg);
  border-radius: var(--radius);
  padding: 40px 32px;
  box-shadow: 0 4px 20px rgba(0,0,0,.05);
}
header { text-align: center; margin-bottom: 36px; }
header h1 { font-size: 1.8em; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; }
header h1 .logo { font-size: 1.2em; }
header p { color: var(--muted); margin-top: 8px; font-size: .95em; }
.divider { height: 1px; background: #eef1ff; margin: 24px 0; }
.quiz-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px;
  border-radius: 12px;
  text-decoration: none;
  color: inherit;
  transition: background .15s;
}
.quiz-row:hover { background: #f8faff; }
.quiz-row .icon { font-size: 1.3em; }
.quiz-row .title { flex: 1; font-weight: 500; font-size: 1.05em; }
.quiz-row .tag {
  font-size: .75em;
  padding: 4px 12px;
  border-radius: 12px;
  font-weight: 600;
  color: #fff;
}
.tag-single { background: var(--single); }
.tag-multi { background: var(--multi); }
.tag-judge { background: var(--judge); }
footer {
  text-align: center;
  color: var(--muted);
  font-size: .85em;
  margin-top: 32px;
}
footer .bulb { margin-right: 4px; }
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <header>
      <h1><span class="logo">📚</span>民法刷题</h1>
      <p>选择以下题目开始练习</p>
    </header>
    <div class="divider"></div>
    <div class="quiz-list">
      
            <a href="quiz/民法真金题1-100.html" class="quiz-row">
                <span class="icon">📄</span>
                <span class="title">2026年法考民法真金题（精简版·第1-100页）单选50题</span>
                <span class="tag tag-single">单选</span>
            </a>
            

            <a href="quiz/民法真金题1-100-多选.html" class="quiz-row">
                <span class="icon">📄</span>
                <span class="title">2026年法考民法真金题（精简版·第1-100页）多选41题</span>
                <span class="tag tag-multi">多选</span>
            </a>
            

            <a href="quiz/民法真金题101-200-多选.html" class="quiz-row">
                <span class="icon">📄</span>
                <span class="title">2026年法考民法真金题（精简版·第101-200页）多选29题</span>
                <span class="tag tag-multi">多选</span>
            </a>
            
    </div>
  </div>
  <footer>
    <p><span class="bulb">💡</span>点击题目开始刷题 · 数据来自飞书多维表格</p>
  </footer>
</div>
</body>
</html>
